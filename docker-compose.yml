# =============================================================================
# Real-Time Events Analytics Pipeline - Local Orchestration
# -----------------------------------------------------------------------------
# Brings up the full local stack:
#   zookeeper  -> kafka  -> schema-registry -> kafka-ui
#   producer   -> Yahoo Finance / mock events into the `events` topic
#   spark-master + spark-worker -> Structured Streaming cluster
#   spark-streaming -> submits the streaming job (consumer -> BigQuery)
#
# Usage:
#   docker compose up -d zookeeper kafka schema-registry   # core bus first
#   docker compose up -d producer spark-master spark-worker spark-streaming
#   docker compose --profile ui up -d kafka-ui             # optional console
#
# Notes:
#   * Kafka is exposed on two listeners: 29092 (internal/inter-container) and
#     9092 (host machine), so local dev tools can connect from the host too.
#   * GCP credentials are mounted read-only from ./config/gcp-key.json.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # ZooKeeper - Kafka coordination/metadata
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: rtep-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Allow the `ruok` four-letter word for manual debugging; also set the JVM
      # system property directly since the image doesn't translate this key.
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr,stat"
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    healthcheck:
      # Plain TCP port check via bash built-in — image-independent, no reliance
      # on the 4lw whitelist or netcat flags.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Kafka Broker
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: rtep-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # host access
      - "29092:29092"    # inter-container access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # topics created explicitly
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Topic bootstrap - creates `events` and `dead-letter-events` once, then exits
  # ---------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: rtep-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    # Single-line, &&-joined commands (no backslash continuations, which are
    # fragile inside a YAML block scalar).
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        echo 'Creating Kafka topics...' &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic events --partitions 3 --replication-factor 1 --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead-letter-events --partitions 3 --replication-factor 1 --config retention.ms=1209600000 &&
        echo 'Topics created:' &&
        kafka-topics --bootstrap-server kafka:29092 --list
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Confluent Schema Registry (Bonus: schema registry support)
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: rtep-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Kafka UI - optional management console (profile: ui)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: rtep-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: rtep-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: "true"
    profiles: ["ui"]
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Producer - Yahoo Finance / mock events -> `events` topic
  # ---------------------------------------------------------------------------
  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: rtep-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      # Set SOURCE_FORCE_MOCK=true to skip live Yahoo Finance calls (offline demo).
      SOURCE_FORCE_MOCK: "${SOURCE_FORCE_MOCK:-false}"
      PYTHONUNBUFFERED: 1
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Spark Master
  # ---------------------------------------------------------------------------
  spark-master:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: rtep-spark-master
    hostname: spark-master
    # Official-image foreground command to run the standalone Master.
    command:
      - "spark-class"
      - "org.apache.spark.deploy.master.Master"
      - "--host"
      - "spark-master"
      - "--port"
      - "7077"
      - "--webui-port"
      - "8080"
    ports:
      - "8090:8080"     # Spark master UI
      - "7077:7077"     # Spark master RPC
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - spark-checkpoints:/app/checkpoints
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Spark Worker
  # ---------------------------------------------------------------------------
  spark-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: rtep-spark-worker
    depends_on:
      - spark-master
    # Official-image foreground command to run a standalone Worker.
    command:
      - "spark-class"
      - "org.apache.spark.deploy.worker.Worker"
      - "--webui-port"
      - "8081"
      - "--cores"
      - "2"
      - "--memory"
      - "2G"
      - "spark://spark-master:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - spark-checkpoints:/app/checkpoints
    networks:
      - rtep-net

  # ---------------------------------------------------------------------------
  # Spark Streaming Job - the consumer (Kafka -> validate -> aggregate -> BQ)
  # ---------------------------------------------------------------------------
  spark-streaming:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: rtep-spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    # local[*] mode: the streaming job runs self-contained (no separate cluster
    # needed for a single-node demo). Point --master at spark://spark-master:7077
    # instead to run on the standalone cluster (master + worker services).
    command: >
      spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,com.google.cloud.spark:spark-bigquery-with-dependencies_2.12:0.41.0
      --conf spark.sql.streaming.checkpointLocation=/app/checkpoints
      /app/spark/streaming_job.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      GOOGLE_APPLICATION_CREDENTIALS: /app/config/gcp-key.json
      # BigQuery target — forwarded from the host .env so config.yaml resolves to
      # the real project/dataset inside the container (no .env is mounted here).
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-my-gcp-project}"
      BQ_DATASET: "${BQ_DATASET:-rtep_analytics}"
      BQ_LOCATION: "${BQ_LOCATION:-US}"
      BQ_TEMP_BUCKET: "${BQ_TEMP_BUCKET:-rtep-spark-temp}"
      # Output sink: bigquery (default) | console | parquet.
      # Run offline with no GCP:  SINK_TYPE=console docker compose up spark-streaming
      SINK_TYPE: "${SINK_TYPE:-bigquery}"
      PYTHONUNBUFFERED: 1
    ports:
      - "4040:4040"     # Spark application UI (per-job)
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - spark-checkpoints:/app/checkpoints
    restart: on-failure
    networks:
      - rtep-net

# -----------------------------------------------------------------------------
# Named volumes & network
# -----------------------------------------------------------------------------
volumes:
  spark-checkpoints:
    driver: local

networks:
  rtep-net:
    driver: bridge
    name: rtep-net
