# =============================================================================
# CI - lint, type-check and test the Real-Time Events Analytics Pipeline
# -----------------------------------------------------------------------------
# Runs on every push / PR to main. Spark/JVM tests self-skip when no compatible
# environment is present; the `test-fast` path excludes them for speed, and a
# separate job runs the full suite with a JDK available.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint + static type-check (fast, no JVM)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: isort (check only)
        run: isort --check-only --diff .

      - name: black (check only)
        run: black --check --diff .

      - name: flake8
        run: flake8 producer validation dlq spark monitoring config utils

      - name: mypy
        run: mypy producer validation dlq spark monitoring config utils
        continue-on-error: true  # type-check advisory; do not block merges yet

  # ---------------------------------------------------------------------------
  # Unit tests (full suite, JDK available so Spark tests can run)
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite with coverage
        env:
          # Minimal env so config_loader resolves without real secrets.
          GCP_PROJECT_ID: ci-project
          BQ_DATASET: rtep_analytics_ci
          BQ_TEMP_BUCKET: rtep-ci-temp
        run: pytest --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Validate Docker images build
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build producer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.producer
          push: false
          tags: rtep-producer:ci

      - name: Validate docker-compose config
        run: docker compose config --quiet
