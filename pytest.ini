[pytest]
# Test discovery + sensible defaults for the pipeline suite.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --cov=producer
    --cov=validation
    --cov=dlq
    --cov=spark
    --cov=monitoring
    --cov=config
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:logs/htmlcov
filterwarnings =
    ignore::DeprecationWarning
markers =
    spark: tests that require a local SparkSession / JVM
