# =============================================================================
# Tooling configuration: flake8 + isort (black-compatible).
# black itself uses its own defaults (line length 88); these settings make
# flake8 and isort agree with black so CI lint is consistent.
# =============================================================================

[flake8]
max-line-length = 88
# Black compatibility: E203 (slice whitespace) and W503 (line break before
# binary operator) conflict with black's formatting. E501 long lines are caught
# by black; allow a little slack for unsplittable strings/URLs.
extend-ignore = E203, W503, E501, E741
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    .pytest_cache,
    .mypy_cache
per-file-ignores =
    # Package __init__ files intentionally re-export names.
    __init__.py: F401
    # Test modules use pytest.importorskip before imports (module-level).
    tests/*: E402, F401

[isort]
profile = black
line_length = 88
known_first_party = config,producer,spark,validation,dlq,schemas,utils,monitoring
skip = .venv,venv,build,dist
